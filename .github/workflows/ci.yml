name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  quality:
    name: Code Quality
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: latest

      - name: shellcheck
        run: |
          brew install shellcheck
          shellcheck cmd/cx/completions/cx.bash

      - name: govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

      - name: Test
        run: go test -v -count=1 ./...

  build:
    name: Build
    runs-on: macos-latest
    needs: quality
    strategy:
      matrix:
        goarch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build
        env:
          GOOS: darwin
          GOARCH: ${{ matrix.goarch }}
        run: go build -o cx-darwin-${{ matrix.goarch }} ./cmd/cx

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: cx-darwin-${{ matrix.goarch }}
          path: cx-darwin-${{ matrix.goarch }}
