name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  quality:
    uses: ./.github/workflows/quality.yml

  build:
    name: Build
    runs-on: macos-latest
    needs: quality
    strategy:
      matrix:
        goarch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build
        env:
          GOOS: darwin
          GOARCH: ${{ matrix.goarch }}
        run: go build -o cx-darwin-${{ matrix.goarch }} ./cmd/cx

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: cx-darwin-${{ matrix.goarch }}
          path: cx-darwin-${{ matrix.goarch }}
          retention-days: 7
